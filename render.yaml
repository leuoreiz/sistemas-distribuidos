# Blueprint do Render — define toda a infraestrutura na nuvem como código (IaC).
# Ao conectar este repositório no Render (New + > Blueprint), ele cria
# automaticamente o serviço web e o banco Redis gerenciado.
#
# No plano gratuito o worker roda EMBUTIDO na API (RUN_EMBEDDED_WORKER=true),
# então todo o fluxo produtor -> fila -> consumidor funciona na nuvem com 1 serviço.
# (Para mostrar réplicas/load balancer de verdade, use o docker-compose local.)

services:
  - type: web
    name: sistema-distribuido
    runtime: docker
    dockerfilePath: ./app/Dockerfile
    dockerContext: ./app
    plan: free
    healthCheckPath: /health
    envVars:
      - key: RUN_EMBEDDED_WORKER
        value: "true"
      - key: REDIS_URL
        fromService:
          name: fila-redis
          type: redis
          property: connectionString

  - type: redis
    name: fila-redis
    plan: free
    ipAllowList: []          # acessível apenas pelos serviços internos do Render
    maxmemoryPolicy: noeviction
