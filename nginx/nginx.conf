# Load balancer (Nginx) — distribui as requisições entre as réplicas da API.
# Demonstra balanceamento de carga e transparência: o cliente acessa um único
# endereço (localhost:8080) e não sabe qual réplica respondeu.

events {}

http {
    # Round-robin entre as réplicas. O docker-compose resolve "api" para os
    # IPs de todas as réplicas do serviço; o Nginx alterna entre elas.
    upstream api_backend {
        server api:8000;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
