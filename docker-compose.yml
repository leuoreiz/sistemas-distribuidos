# Demonstração LOCAL do sistema distribuído completo.
#
#   nginx (load balancer)  ->  3 réplicas da API  ->  Redis (fila/estado)  ->  3 workers
#
# Premissas demonstradas ao vivo:
#   - Escalabilidade horizontal (várias réplicas de API e de worker)
#   - Balanceamento de carga (Nginx round-robin entre as réplicas)
#   - Concorrência (workers processam em paralelo)
#   - Tolerância a falhas (derrube um worker: a fila continua sendo consumida)
#   - Comunicação por mensagens (tudo via fila no Redis)
#
# Subir:    docker compose up --build --scale api=3 --scale worker=3
# Acessar:  http://localhost:8080

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./app
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RUN_EMBEDDED_WORKER=false   # local os workers são serviços separados
      - PORT=8000
    depends_on:
      redis:
        condition: service_healthy
    # sem ports: o acesso é só pelo load balancer (transparência)

  worker:
    build: ./app
    command: ["python", "worker.py"]
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - api
